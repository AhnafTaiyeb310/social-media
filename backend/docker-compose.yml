services:
  web:
    build: "."
    command: uv run python manage.py runserver 0.0.0.0:8000
    volumes:
      - ".:/app"
      - "/app/.venv"
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - app-network
    env_file:
      - ".env"

  redis:
    image: "redis:7"
    ports:
      - "6379:6379"
    networks:
      - app-network

  celery:
    build: "."
    volumes:
      - ".:/app"
      - "/app/.venv"
    command: uv run celery -A core worker -l info
    depends_on:
      - redis
      - web
    networks:
      - app-network
    env_file:
      - ".env"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge