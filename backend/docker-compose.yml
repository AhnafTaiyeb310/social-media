services:
  web:
    build: "./backend"
    command: "python manage.py runserver 0.0.0.0:8000"
    volumes:
      - "./backend:/app"
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - app-network
    env_file:
      - "./backend/.env"

  redis:
    image: "redis:7"
    ports:
      - "6379:6379"
    networks:
      - app-network

  celery:
    build: "./backend"
    command: "celery -A core worker -l info"
    depends_on:
      - redis
      - web
    networks:
      - app-network
    env_file:
      - "./backend/.env"

networks:
  app-network:
    driver: bridge