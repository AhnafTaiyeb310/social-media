services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - app-network

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - app-network

  celery:
    build: .
    command: celery -A core worker -l info
    depends_on:
      - redis
      - web
    networks:
      - app-network

networks:
  app-network: