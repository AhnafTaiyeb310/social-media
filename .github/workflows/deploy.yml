name: CD - Deploy to Server

on:
  push:
    branches: [ "main" ] # Triggers only on push to main

env:
  # Force GitHub Actions to use Node.js 24 to avoid deprecation errors
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        # Updated to the latest stable version compatible with newer Node runtimes
        uses: appleboy/ssh-action@v1.1.0 
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Navigate to project directory
            cd /path/to/your/social-media/backend
            
            # Pull latest changes
            git pull origin main
            
            # Use uv to sync the environment
            uv sync --frozen
            
            # Run migrations
            uv run python manage.py migrate --noinput
            
            # Restart your application server
            sudo systemctl restart gunicorn